name: Deploy Web Build to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# 讓 GITHUB_TOKEN 有權限部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，新的 push 會取消還在排隊的舊任務
concurrency:
  group: pages
  cancel-in-progress: true

env:
  # 必須與你本機 Godot 版本一致（Editor → Help → About 確認）
  # 對齊本機 4.6.2-stable
  GODOT_VERSION: "4.6.2"

jobs:
  export-web:
    name: Export Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Import Project (let Godot generate .godot cache)
        run: |
          # 第一次 headless 開啟讓 Godot 匯入資源並產生 .godot/ 資料夾
          # --quit 讓它跑完匯入就退出
          godot --headless --import || true

      - name: Export Web Build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          ls -la build/web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
